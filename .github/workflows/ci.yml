name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Start mock services
        run: ./start_services.sh

      - name: Run tests
        run: pytest --tb=short

      - name: Eval (simulate)
        run: python eval.py --simulate

      - name: Stop mock services
        if: always()
        run: ./start_services.sh --stop
